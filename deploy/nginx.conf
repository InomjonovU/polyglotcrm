# ============================================================
# PolyglotLC — Nginx config
# ============================================================
# Joylashuv: /etc/nginx/sites-available/polyglot_crm
# Ulash:    sudo ln -s /etc/nginx/sites-available/polyglot_crm /etc/nginx/sites-enabled/
# Sinash:   sudo nginx -t
# Reload:   sudo systemctl reload nginx
# ------------------------------------------------------------

# crm.example.uz va www.crm.example.uz ni o'z domeningizga almashtiring

# HTTP → HTTPS redirect (certbot avtomatik tahrirlaydi, lekin boshlanish uchun)
server {
    listen 80;
    listen [::]:80;
    server_name crm.example.uz www.crm.example.uz;

    # Let's Encrypt verification uchun
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Asosiy HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name crm.example.uz www.crm.example.uz;

    # SSL — certbot avtomatik to'ldiradi
    ssl_certificate /etc/letsencrypt/live/crm.example.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/crm.example.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Hajm cheklovi (uy vazifa fayl yuklash uchun katta)
    client_max_body_size 25M;

    # ------------------------------------------------------------
    # Frontend (React build) — statik fayllar
    # ------------------------------------------------------------
    root /opt/polyglot_crm/frontend/dist;
    index index.html;

    # SPA — har qanday route index.html'ga
    location / {
        try_files $uri $uri/ /index.html;
        # Cache headers
        add_header Cache-Control "public, max-age=300";
    }

    # Vite assets — uzoq cache
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ------------------------------------------------------------
    # Backend API
    # ------------------------------------------------------------
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
    }

    # Django admin
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django static (admin CSS/JS)
    location /static/ {
        alias /opt/polyglot_crm/backend/staticfiles/;
        expires 30d;
        access_log off;
    }

    # Foydalanuvchi yuklagan fayllar (homework attachments)
    location /media/ {
        alias /opt/polyglot_crm/backend/media/;
        expires 7d;
        access_log off;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;
}
